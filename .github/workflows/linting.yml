name: Linting

on:
  push:
  pull_request:
  workflow_dispatch: # Allow manual triggering

jobs:
  linting:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - id: update
        name: Update
        run: sudo apt-get update

      - id: checkout
        name: Checkout Repository
        uses: actions/checkout@v4

      - id: node
        name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - id: setup
        name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - id: cache
        name: Enable Workflow Cache
        uses: Swatinem/rust-cache@v2

      - id: install-linter
        name: Install torrust-linting
        run: cargo install torrust-linting --locked

      - id: lint-markdown
        name: Lint Markdown
        run: linter markdown

      - id: lint-yaml
        name: Lint YAML
        run: linter yaml

      - id: lint-cspell
        name: Spell Check
        run: linter cspell

      - id: lint-shell
        name: Lint Shell Scripts
        run: linter shellcheck
